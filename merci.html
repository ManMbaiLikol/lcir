<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message envoyé — LCIR</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/lcir/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Newsreader:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
       background:#f8f2e3;color:#171410;font-family:'Inter',system-ui,sans-serif;text-align:center;padding:40px 24px}
  .badge{width:64px;height:64px;border-radius:50%;background:#171410;color:#c9932e;display:flex;align-items:center;
         justify-content:center;font-size:30px;margin-bottom:26px}
  .kicker{font-size:12px;font-weight:800;letter-spacing:.1em;color:#8a6614;margin-bottom:18px;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:#c9932e;display:inline-block}
  h1{font-size:52px;line-height:1.05;font-weight:800;margin:0 0 18px;max-width:14em}
  .serif{font-family:'Newsreader',serif;font-style:italic;font-weight:500;color:#a3781f}
  p{font-size:17px;color:rgba(23,20,16,.75);max-width:34em;line-height:1.6;margin:0 0 32px}
  a.home{background:#171410;color:#f8f2e3;border-radius:999px;padding:16px 26px;font-size:12px;font-weight:800;
         letter-spacing:.05em;text-decoration:none;display:inline-flex;align-items:center;gap:10px;transition:transform .2s,background .2s}
  a.home:hover{transform:translateY(-2px);background:#2a241a}
  .links{margin-top:28px;display:flex;gap:22px;flex-wrap:wrap;justify-content:center;font-size:12px;font-weight:700;letter-spacing:.04em}
  .links a{color:#8a6614;text-decoration:none}
  .links a:hover{color:#a3781f}
</style>
</head>
<body>
  <div class="badge">✓</div>
  <div class="kicker"><span class="dot"></span>MESSAGE ENVOYÉ</div>
  <h1>Merci.<br><span class="serif">Nous vous répondrons vite.</span></h1>
  <p>Votre message a bien été transmis au LCIR. Nous revenons vers vous dès que possible à l'adresse indiquée.</p>
  <a class="home" href="/lcir/">RETOUR À L'ACCUEIL <span>→</span></a>
  <div class="links">
    <a href="/lcir/publications.html">PUBLICATIONS</a>
    <a href="/lcir/a-propos.html">MISSION</a>
    <a href="/lcir/equipe.html">ÉQUIPE</a>
  </div>
  <script src="/lcir/analytics.js"></script>
</body>
</html>
