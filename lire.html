<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lecture en ligne — LCIR</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/logo-lcir.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:#100e0b}
  /* Barre fixe : reste visible en permanence, y compris sur mobile */
  .bar{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;gap:16px;
       padding:0 20px;background:#f8f2e3;border-bottom:1px solid rgba(0,0,0,.12);z-index:10}
  .brand{display:flex;align-items:center;flex:none;text-decoration:none}
  .brand img{height:38px;width:auto;display:block}
  .back{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.04em;
        color:#171410;text-decoration:none;padding:9px 16px;border:1px solid rgba(0,0,0,.2);border-radius:999px;
        white-space:nowrap;transition:background .2s,color .2s}
  .back:hover{background:#171410;color:#f8f2e3;border-color:#171410}
  .title{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#8a6614;
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .links{display:flex;gap:4px;align-items:center;flex:none}
  .links a{font-size:12px;font-weight:700;letter-spacing:.03em;color:#171410;text-decoration:none;
           padding:8px 14px;border-radius:999px;transition:background .2s,color .2s}
  .links a:hover{background:#171410;color:#f8f2e3}
  /* Hauteur explicite : une iframe est un élément remplacé, top/bottom ne l'étirent pas. */
  .frame{position:fixed;top:64px;left:0;display:block;width:100%;height:calc(100% - 64px);
         border:0;background:#faf9f5}
  .err{position:fixed;inset:64px 0 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;
       gap:16px;color:#f8f2e3;text-align:center;padding:24px}
  .err a{color:#c9932e;font-weight:800}
  @media (max-width:760px){
    .title{display:none}
    .bar{gap:10px;padding:0 12px}
    .links a{padding:8px 11px}
    .brand img{height:32px}
    /* Le bouton Précédent mène déjà aux publications : on retire le doublon
       pour que la barre tienne en largeur sans rogner « Contact ». */
    .links a[href="publications.html"]{display:none}
  }
</style>
</head>
<body>
  <div class="bar">
    <a class="brand" href="index.html"><img src="assets/logo-lcir.png" alt="LCIR"></a>
    <a class="back" href="publications.html"><span>&larr;</span> Publications</a>
    <div class="title" id="title">Lecture en ligne</div>
    <div class="links">
      <a href="index.html">Accueil</a>
      <a href="publications.html">Publications</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
  <iframe class="frame" id="frame" title="Document en lecture"></iframe>
  <script>
    (function(){
      var params = new URLSearchParams(location.search);
      var src = params.get('src') || '';
      var titre = params.get('titre') || '';
      // Sécurité : n'autorise que les documents locaux du dossier assets/
      var ok = /^assets\/[A-Za-z0-9._-]+\.html$/.test(src);
      var frame = document.getElementById('frame');
      if (ok) {
        frame.src = src;
        if (titre) {
          document.getElementById('title').textContent = titre;
          document.title = titre + ' — LCIR';
        }

        // Les documents sont des pages de largeur fixe (~864 px) : elles ne se
        // reformatent pas. Sous cette largeur, on met l'iframe à l'échelle pour
        // afficher la page entière plutôt que d'imposer un défilement latéral.
        var DOC_WIDTH = 864, BAR = 64;

        // Largeur à afficher, gouttière de la barre de défilement interne comprise
        // (nulle sur mobile, ~15 px sur desktop) : sans elle la page est rognée.
        function largeurRequise() {
          var doc = frame.contentDocument;
          var el = doc && doc.documentElement;
          if (!el || !el.scrollWidth) return DOC_WIDTH;
          var gouttiere = Math.max(0, frame.clientWidth - el.clientWidth);
          return Math.max(DOC_WIDTH, el.scrollWidth + gouttiere);
        }

        function ajuster() {
          var vw = document.documentElement.clientWidth;
          var vh = window.innerHeight - BAR;
          if (vw >= DOC_WIDTH) {
            frame.style.width = '';
            frame.style.height = '';
            frame.style.transform = '';
            return;
          }
          frame.style.transform = 'none';
          frame.style.width = DOC_WIDTH + 'px';
          var largeur = largeurRequise();
          var s = vw / largeur;
          frame.style.width = largeur + 'px';
          frame.style.height = (vh / s) + 'px';
          frame.style.transform = 'scale(' + s + ')';
          frame.style.transformOrigin = 'top left';
        }

        // Le document se déballe après l'événement load, en plusieurs secondes :
        // sa largeur n'est pas mesurable tout de suite. On réajuste jusqu'à ce
        // qu'elle se stabilise (un observateur ne survivrait pas au déballage,
        // qui remplace documentElement).
        var derniere = -1, stables = 0;
        var suivi = setInterval(function(){
          var largeur = largeurRequise();
          if (largeur === derniere) { stables++; } else { stables = 0; derniere = largeur; }
          ajuster();
          if (stables >= 3) clearInterval(suivi);
        }, 400);
        setTimeout(function(){ clearInterval(suivi); }, 30000);

        ajuster();
        window.addEventListener('resize', ajuster);
        window.addEventListener('orientationchange', ajuster);
      } else {
        frame.remove();
        var d = document.createElement('div');
        d.className = 'err';
        d.innerHTML = '<div style="font-size:20px;font-weight:800">Document introuvable</div>' +
          '<a href="publications.html">&larr; Retour aux publications</a>';
        document.body.appendChild(d);
      }
    })();
  </script>
  <script type="module">
    // Ajoute un lien « Suivant » vers le cahier suivant, dans la barre du haut.
    import { pubByRead, nextPublication } from './article-nav.js';
    (function(){
      var src = new URLSearchParams(location.search).get('src') || '';
      var cur = pubByRead(src);
      var next = cur ? nextPublication(cur.id) : null;
      var links = document.querySelector('.links');
      if (!next || !links) return;
      var a = document.createElement('a');
      a.href = next.read;
      a.title = next.title;
      a.innerHTML = 'Suivant <span>&rarr;</span>';
      links.appendChild(a);
    })();
  </script>
</body>
</html>
